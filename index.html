<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWP Proposal Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --green:#0a4c3e;
      --yellow:#e7bd52;
      --cream:#f7f2e7;
      --ink:#15372f;
      --muted:#6b746f;
      --line:#e7dfcf;
      --white:#ffffff;
      --soft:#fbf8f0;
      --shadow:0 24px 70px rgba(10,76,62,.14);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Baloo Bhaijaan 2", system-ui, sans-serif;
      background:radial-gradient(circle at top left, rgba(231,189,82,.28), transparent 32%), linear-gradient(135deg,#fbf7ee,#f1eadb);
      color:var(--ink);
      line-height:1.6;
    }
    .app-header{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(10,76,62,.96);
      color:white;
      padding:16px 22px;
      backdrop-filter:blur(12px);
      box-shadow:0 12px 40px rgba(10,76,62,.2);
    }
    .wrap{
      max-width:1440px;
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }
    .brand-lockup{display:flex;align-items:center;gap:14px}
    .mark{
      width:58px;
      height:58px;
      border-radius:18px;
      background:var(--yellow);
      color:var(--green);
      display:grid;
      place-items:center;
      font-size:20px;
      font-weight:800;
      letter-spacing:-1px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.3);
    }
    .app-header h1{font-size:24px;margin:0;font-weight:800}
    .app-header p{font-size:14px;margin:2px 0 0;color:rgba(255,255,255,.76)}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      border:0;
      border-radius:999px;
      padding:12px 18px;
      font-family:inherit;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--yellow);color:var(--green)}
    .btn-dark{background:white;color:var(--green)}
    .btn-soft{background:rgba(255,255,255,.13);color:white;border:1px solid rgba(255,255,255,.22)}
    .btn-block{width:100%;margin-top:14px}
    .layout{
      max-width:1440px;
      margin:auto;
      display:grid;
      grid-template-columns:390px minmax(0,1fr);
      gap:24px;
      padding:24px;
    }
    .controls{
      position:sticky;
      top:105px;
      align-self:start;
      max-height:calc(100vh - 120px);
      overflow:auto;
      padding-left:4px;
    }
    .panel{
      background:rgba(255,255,255,.86);
      border:1px solid rgba(10,76,62,.12);
      border-radius:26px;
      box-shadow:0 16px 40px rgba(10,76,62,.08);
      margin-bottom:16px;
      overflow:hidden;
    }
    .panel summary{
      cursor:pointer;
      padding:18px 20px;
      font-weight:800;
      color:var(--green);
      list-style:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .panel summary::-webkit-details-marker{display:none}
    .panel-body{padding:0 20px 20px}
    .field{margin:12px 0}
    label{
      display:block;
      margin-bottom:6px;
      color:var(--green);
      font-weight:700;
      font-size:14px;
    }
    .input, textarea, select{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fffdf8;
      padding:12px 14px;
      font-family:inherit;
      font-size:15px;
      outline:none;
      color:var(--ink);
    }
    textarea{min-height:92px;resize:vertical}
    .two,.three{display:grid;gap:10px}
    .two{grid-template-columns:1fr 1fr}
    .three{grid-template-columns:1fr 1fr 1fr}
    .check-grid{display:grid;grid-template-columns:1fr;gap:8px}
    .check{
      display:flex;
      align-items:center;
      gap:9px;
      background:#fffdf8;
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px 12px;
      color:var(--ink);
      font-weight:600;
      cursor:pointer;
    }
    .check input{accent-color:var(--green)}
    .quick-row{display:flex;gap:8px;margin:10px 0 14px}
    .quick{
      flex:1;
      border:1px solid rgba(10,76,62,.16);
      background:#fffdf8;
      color:var(--green);
      border-radius:999px;
      padding:9px 12px;
      font-family:inherit;
      font-weight:800;
      cursor:pointer;
    }
    .micro{margin:0;color:var(--muted);font-size:14px}
    .preview{display:flex;flex-direction:column;gap:24px}
    .page{
      position:relative;
      min-height:1122px;
      background:white;
      border-radius:34px;
      padding:56px;
      box-shadow:var(--shadow);
      overflow:hidden;
      border:1px solid rgba(10,76,62,.08);
    }
    .page:before{
      content:"";
      position:absolute;
      inset:0 auto 0 0;
      width:11px;
      background:linear-gradient(180deg,var(--yellow),var(--green));
    }
    .page:after{
      content:"";
      position:absolute;
      width:260px;
      height:260px;
      border-radius:50%;
      background:rgba(231,189,82,.13);
      left:-90px;
      top:-90px;
      z-index:0;
    }
    .page > *{position:relative;z-index:1}
    .cover{
      background:
        radial-gradient(circle at 18% 18%, rgba(231,189,82,.32), transparent 28%),
        linear-gradient(135deg,var(--green),#05372d 72%);
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .cover:before{background:var(--yellow)}
    .cover:after{background:rgba(255,255,255,.08)}
    .cover-top{display:flex;align-items:center;justify-content:space-between}
    .logo{
      width:104px;
      height:104px;
      border-radius:30px;
      background:var(--yellow);
      color:var(--green);
      display:grid;
      place-items:center;
      font-size:32px;
      font-weight:800;
      letter-spacing:-2px;
    }
    .tag{
      border:1px solid rgba(255,255,255,.26);
      border-radius:999px;
      padding:10px 16px;
      color:rgba(255,255,255,.78);
      font-weight:700;
    }
    .cover h1{
      font-size:62px;
      line-height:1.12;
      margin:90px 0 18px;
      max-width:760px;
      font-weight:800;
    }
    .cover p{font-size:22px;color:rgba(255,255,255,.82)}
    .cover-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:720px}
    .cover-box{
      background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.18);
      border-radius:26px;
      padding:22px;
    }
    .cover-box small{display:block;color:rgba(255,255,255,.62);font-size:14px}
    .cover-box strong{display:block;font-size:25px;margin-top:6px;color:white}
    .kicker{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:8px 14px;
      background:rgba(231,189,82,.18);
      color:var(--green);
      font-size:14px;
      font-weight:800;
      margin-bottom:18px;
    }
    .dark-page .kicker{background:rgba(231,189,82,.18);color:var(--yellow)}
    .title{
      font-size:42px;
      line-height:1.2;
      margin:0 0 14px;
      color:var(--green);
      font-weight:800;
    }
    .subtitle{
      font-size:21px;
      color:var(--muted);
      max-width:860px;
      margin:0 0 28px;
      line-height:1.9;
    }
    .lead{
      margin-top:28px;
      background:var(--green);
      color:white;
      border-radius:28px;
      padding:28px;
      font-size:26px;
      line-height:1.7;
      font-weight:700;
    }
    .grid-2,.grid-3,.option-grid,.summary-box,.signature,.stat-row{
      display:grid;
      gap:18px;
    }
    .grid-2{grid-template-columns:1fr 1fr}
    .grid-3{grid-template-columns:repeat(3,1fr)}
    .stat-row{grid-template-columns:repeat(3,1fr);margin:34px 0}
    .stat{
      background:var(--soft);
      border:1px solid var(--line);
      border-radius:26px;
      padding:24px;
      text-align:center;
    }
    .stat strong{display:block;color:var(--green);font-size:38px;line-height:1;font-weight:800}
    .stat span{display:block;color:var(--muted);font-weight:700;margin-top:8px}
    .info{
      background:#fffdf8;
      border:1px solid var(--line);
      border-radius:26px;
      padding:24px;
      min-height:158px;
    }
    .info.soft{background:#f7f4eb}
    .info.yellow{background:rgba(231,189,82,.17)}
    .info h3{font-size:24px;color:var(--green);margin:0 0 8px}
    .info p{margin:0;color:var(--muted);font-size:17px;line-height:1.8}
    h3{color:var(--green);font-size:24px;margin:24px 0 10px}
    .service-list{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .pill{
      background:#fffdf8;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 16px;
      font-weight:700;
      color:var(--ink);
    }
    .channel-list{display:flex;flex-wrap:wrap;gap:10px}
    .channel{
      display:inline-flex;
      align-items:center;
      padding:11px 18px;
      border-radius:999px;
      background:var(--green);
      color:white;
      font-weight:800;
    }
    .divider{height:1px;background:var(--line);margin:28px 0}
    .option-grid{grid-template-columns:1fr 1fr}
    .option-card{
      border:1px solid var(--line);
      border-radius:34px;
      padding:30px;
      background:#fffdf8;
      min-height:520px;
      position:relative;
      overflow:hidden;
    }
    .option-card.featured{
      background:linear-gradient(180deg,rgba(231,189,82,.18),#fffdf8);
      border-color:rgba(231,189,82,.55);
    }
    .option-card h3{font-size:34px;margin:0 0 10px;color:var(--green)}
    .option-card .desc{color:var(--muted);font-size:18px;line-height:1.8}
    .amount{
      background:var(--green);
      color:white;
      border-radius:26px;
      padding:18px;
      font-size:31px;
      font-weight:800;
      margin:22px 0;
    }
    .amount small{display:block;font-size:14px;color:rgba(255,255,255,.7);font-weight:600}
    .spec-list{padding:0;margin:0;list-style:none;display:grid;gap:10px}
    .spec-list li{
      display:flex;
      justify-content:space-between;
      gap:16px;
      border-bottom:1px solid var(--line);
      padding:11px 0;
      color:var(--muted);
      font-size:17px;
    }
    .spec-list strong{font-size:22px;color:var(--green)}
    table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border:1px solid var(--line);border-radius:24px;background:white}
    th,td{padding:16px;border-bottom:1px solid var(--line);text-align:right;vertical-align:middle}
    th{background:var(--green);color:white;font-size:16px}
    td{font-size:17px;color:var(--ink)}
    tr:last-child td{border-bottom:0}
    .summary-box{grid-template-columns:1fr 1fr;margin-top:20px}
    .money{
      border-radius:24px;
      padding:20px;
      background:var(--green);
      color:white;
    }
    .money.yellow{background:var(--yellow);color:var(--green)}
    .money h3{margin:0 0 8px;color:inherit;font-size:18px}
    .money strong{font-size:30px}
    .note,.payment-note{
      background:rgba(231,189,82,.16);
      border:1px solid rgba(231,189,82,.38);
      border-radius:24px;
      padding:20px;
      color:var(--ink);
      font-size:18px;
    }
    .dark-page{
      background:linear-gradient(135deg,var(--green),#04342b);
      color:white;
    }
    .dark-page:before{background:var(--yellow)}
    .dark-page .title,.dark-page h2,.dark-page h3{color:white}
    .acceptance-title{font-size:50px;line-height:1.2;margin:0 0 20px}
    .acceptance-text{font-size:22px;color:rgba(255,255,255,.82);max-width:860px}
    .payment-note{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18);color:white;margin:35px 0}
    .payment-note h3{color:var(--yellow);margin-top:0}
    .signature{grid-template-columns:1fr 1fr;margin-top:35px}
    .sig-box{
      border:1px solid rgba(255,255,255,.28);
      border-radius:28px;
      min-height:170px;
      padding:24px;
      background:rgba(255,255,255,.08);
    }
    .sig-line{
      margin-top:68px;
      border-top:1px solid rgba(255,255,255,.45);
      padding-top:12px;
      color:rgba(255,255,255,.74);
    }
    .footer-brand,.page-num{
      position:absolute;
      bottom:26px;
      color:rgba(10,76,62,.45);
      font-weight:800;
      font-size:13px;
    }
    .footer-brand{right:56px}
    .page-num{left:56px}
    .dark-page .footer-brand,.dark-page .page-num{color:rgba(255,255,255,.45)}

    .clients-logo-board{
      background:#fff;
      border:1px solid rgba(10,76,62,.12);
      border-radius:30px;
      padding:18px;
      box-shadow:0 18px 45px rgba(10,76,62,.08);
      margin-top:28px;
    }
    .clients-logo-board img{
      display:block;
      width:100%;
      height:auto;
      border-radius:20px;
    }
    .clients-page-note{
      margin-top:22px;
      background:rgba(231,189,82,.14);
      border:1px solid rgba(231,189,82,.34);
      border-radius:22px;
      padding:18px 22px;
      color:var(--ink);
      font-size:17px;
      font-weight:700;
      line-height:1.8;
    }
    @media print{
      body{background:white}
      .no-print,.app-header,.controls{display:none!important}
      .layout{display:block;padding:0;max-width:none}
      .preview{gap:0}
      .page{
        border:0;
        border-radius:0;
        box-shadow:none;
        min-height:100vh;
        page-break-after:always;
        padding:46px;
      }
      .page:last-child{page-break-after:auto}
      @page{size:A4;margin:0}
      .cover h1{font-size:55px}
      .title{font-size:34px}
      .subtitle{font-size:16px}
      .grid-3{grid-template-columns:repeat(3,1fr)}
      .option-grid,.grid-2,.summary-box,.signature{grid-template-columns:1fr 1fr}
    }
    @media (max-width:980px){
      .layout{grid-template-columns:1fr}
      .wrap{flex-direction:column;align-items:flex-start}
      .cover h1{font-size:42px}
      .page{padding:30px;min-height:auto}
      .grid-2,.grid-3,.service-list,.summary-box,.signature,.option-grid,.stat-row{grid-template-columns:1fr}
      .controls{order:1;position:relative;top:auto;max-height:none}
      .preview{order:2}
      .cover-grid{grid-template-columns:1fr}
      .two,.three{grid-template-columns:1fr}
    }
  
    /* Reference-style cover and clients updates */
    .cover{
      background:#064d3f !important;
      color:#fff;
      padding:0 !important;
      border-radius:34px;
      display:block !important;
      min-height:1122px;
      overflow:hidden;
      background-image:
        radial-gradient(circle at 48% 47%, rgba(255,255,255,.035), transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.025), transparent 45%),
        linear-gradient(rgba(0,0,0,.08),rgba(0,0,0,.08)) !important;
    }
    .cover:before,.cover:after{display:none!important}
    .ref-cover-logo{position:absolute;top:34px;left:32px;width:180px;height:auto;z-index:2}
    .ref-cover-center{position:absolute;top:330px;left:0;right:0;text-align:center;z-index:2;padding:0 80px}
    .ref-cover-center h1{font-size:44px;line-height:1.25;margin:0;color:#fff;font-weight:800;max-width:none}
    .ref-cover-center .client-name{font-size:30px;line-height:1.3;margin-top:14px;color:#fff;font-weight:700}
    .ref-cover-bottom{position:absolute;bottom:48px;left:42px;display:flex;gap:34px;align-items:flex-end;z-index:2;color:#fff}
    .ref-cover-meta small{display:block;font-size:14px;color:rgba(255,255,255,.72);font-weight:700;margin-bottom:4px}
    .ref-cover-meta strong{display:block;font-size:23px;color:#fff;font-weight:700}
    .clients-logo-board{border:0!important;background:transparent!important;box-shadow:none!important;padding:10px 0 0!important;margin-top:10px!important}
    .clients-logo-board img{display:block;width:100%!important;max-height:560px!important;object-fit:contain!important}

  </style>
</head>
<body>
  <header class="app-header no-print">
    <div class="wrap">
      <div class="brand-lockup">
        <div class="mark">PWP</div>
        <div>
          <h1>مولّد عروض Post With Passion</h1>
          <p>نسخة فخمة وسهلة الاستخدام مع Option 1 و Option 2 وعرض جاهز للتوقيع والطباعة.</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-dark" onclick="renderProposal()">تحديث العرض</button>
        <button class="btn btn-primary" onclick="window.print()">طباعة أو حفظ PDF</button>
        <button class="btn btn-soft" onclick="copySummary()">نسخ الملخص</button>
      </div>
    </div>
  </header>

  <main class="layout">
    <aside class="controls no-print">
      <details class="panel" open>
        <summary><span>01 بيانات العميل</span></summary>
        <div class="panel-body">
          <div class="field"><label>اسم العميل</label><input class="input" id="clientName" value="اسم العميل"></div>
          <div class="two">
            <div class="field"><label>التاريخ</label><input class="input" id="proposalDate" type="date"></div>
            <div class="field"><label>مدة المشروع</label><input class="input" id="duration" value="3 أشهر"></div>
          </div>
          <div class="field"><label>الهدف الرئيسي</label><textarea id="mainGoal">بناء حضور رقمي أقوى وزيادة فرص الوصول إلى العملاء المحتملين من خلال محتوى محلي وحملات إعلانية قابلة للقياس.</textarea></div>
        </div>
      </details>

      <details class="panel" open>
        <summary><span>02 الخدمات والقنوات</span></summary>
        <div class="panel-body">
          <p class="micro">اختر الخدمات والقنوات التي تريد ظهورها في نطاق العمل.</p>
          <div class="quick-row">
            <button class="quick" onclick="selectRecommended('lean')">اقتراح اقتصادي</button>
            <button class="quick" onclick="selectRecommended('growth')">اقتراح نمو</button>
          </div>
          <div class="field"><label>الخدمات</label><div id="services" class="check-grid"></div></div>
          <div class="field"><label>القنوات</label><div id="channels" class="check-grid"></div></div>
        </div>
      </details>

      <details class="panel" open>
        <summary><span>03 Option 1</span></summary>
        <div class="panel-body">
          <div class="field"><label>اسم الخيار</label><input class="input" id="option1Title" value="Option 1"></div>
          <div class="field"><label>وصف الخيار</label><textarea id="option1Desc">مناسب للعميل الذي يحتاج حضورًا منظمًا ومحتوى مستمرًا مع تشغيل إعلانات أساسي لاختبار الرسائل والقنوات الأعلى أداءً.</textarea></div>
          <div class="three">
            <div class="field"><label>التصاميم</label><input class="input" id="option1Designs" type="number" value="12"></div>
            <div class="field"><label>الفيديوهات القصيرة</label><input class="input" id="option1Videos" type="number" value="6"></div>
            <div class="field"><label>UGC</label><input class="input" id="option1Ugc" type="number" value="2"></div>
          </div>
          <div class="three">
            <div class="field"><label>AI Videos</label><input class="input" id="option1Ai" type="number" value="3"></div>
            <div class="field"><label>المنصات</label><input class="input" id="option1Platforms" type="number" value="3"></div>
            <div class="field"><label>رسوم الباقة</label><input class="input" id="option1Fee" type="number" value="12000"></div>
          </div>
          <div class="two">
            <div class="field"><label>ميزانية الإعلانات</label><input class="input" id="option1Ad" type="number" value="5000"></div>
            <div class="field"><label>رسوم إدارة الإعلانات</label><input class="input" id="option1Mgmt" type="number" value="1500"></div>
          </div>
        </div>
      </details>

      <details class="panel" open>
        <summary><span>04 Option 2</span></summary>
        <div class="panel-body">
          <div class="field"><label>اسم الخيار</label><input class="input" id="option2Title" value="Option 2"></div>
          <div class="field"><label>وصف الخيار</label><textarea id="option2Desc">مناسب للعميل الذي يريد تشغيلًا أقوى ومحتوى أكثر تنوعًا لاختبار زوايا متعددة، مع مساحة أكبر للإعلانات والتحسين المستمر.</textarea></div>
          <div class="three">
            <div class="field"><label>التصاميم</label><input class="input" id="option2Designs" type="number" value="16"></div>
            <div class="field"><label>الفيديوهات القصيرة</label><input class="input" id="option2Videos" type="number" value="10"></div>

  function distribution(channels, budget){
    const filtered = channels.filter(c => c !== 'WhatsApp' && c !== 'YouTube Shorts');
    const weights = filtered.map(c => c.includes('Google') ? 30 : c.includes('Instagram') ? 35 : c.includes('TikTok') ? 25 : c.includes('LinkedIn') ? 20 : 10);
    const sum = weights.reduce((a,b) => a + b, 0) || 1;
    return filtered.map((c,i) => ({channel:c, pct:Math.round(weights[i] / sum * 100), amount:Math.round(budget * weights[i] / sum)}));
  }
