    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Baloo Bhaijaan 2", system-ui, sans-serif;
      background:radial-gradient(circle at top left, rgba(231,189,82,.28), transparent 32%), linear-gradient(135deg,#fbf7ee,#f1eadb);
      color:var(--ink);
      line-height:1.6;
    }
    .app-header{position:sticky;top:0;z-index:20;background:rgba(10,76,62,.96);color:white;padding:16px 22px;backdrop-filter:blur(12px);box-shadow:0 12px 40px rgba(10,76,62,.2)}
    .wrap{max-width:1440px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:18px}
    .brand-lockup{display:flex;align-items:center;gap:14px}
    .mark{width:58px;height:58px;border-radius:18px;background:var(--yellow);color:var(--green);display:grid;place-items:center;font-size:20px;font-weight:800;letter-spacing:-1px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.3)}
    .app-header h1{font-size:24px;margin:0;font-weight:800}
    .app-header p{font-size:14px;margin:2px 0 0;color:rgba(255,255,255,.76)}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:0;border-radius:999px;padding:12px 18px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.2s ease}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--yellow);color:var(--green)}
    .btn-dark{background:white;color:var(--green)}
    .btn-soft{background:rgba(255,255,255,.13);color:white;border:1px solid rgba(255,255,255,.22)}
    .btn-block{width:100%;margin-top:14px}
    .layout{max-width:1440px;margin:auto;display:grid;grid-template-columns:390px minmax(0,1fr);gap:24px;padding:24px}
    .controls{position:sticky;top:105px;align-self:start;max-height:calc(100vh - 120px);overflow:auto;padding-left:4px}
    .panel{background:rgba(255,255,255,.86);border:1px solid rgba(10,76,62,.12);border-radius:26px;box-shadow:0 16px 40px rgba(10,76,62,.08);margin-bottom:16px;overflow:hidden}
    .panel summary{cursor:pointer;padding:18px 20px;font-weight:800;color:var(--green);list-style:none;display:flex;align-items:center;justify-content:space-between}
    .panel summary::-webkit-details-marker{display:none}
    .panel-body{padding:0 20px 20px}
    .field{margin:12px 0}
    label{display:block;margin-bottom:6px;color:var(--green);font-weight:700;font-size:14px}
    .input, textarea, select{width:100%;border:1px solid var(--line);border-radius:16px;background:#fffdf8;padding:12px 14px;font-family:inherit;font-size:15px;outline:none;color:var(--ink)}
    textarea{min-height:92px;resize:vertical}
    .two,.three{display:grid;gap:10px}
    .two{grid-template-columns:1fr 1fr}
    .three{grid-template-columns:1fr 1fr 1fr}
    .check-grid{display:grid;grid-template-columns:1fr;gap:8px}
    .check{display:flex;align-items:center;gap:9px;background:#fffdf8;border:1px solid var(--line);border-radius:16px;padding:10px 12px;color:var(--ink);font-weight:600;cursor:pointer}
    .check input{accent-color:var(--green)}
    .quick-row{display:flex;gap:8px;margin:10px 0 14px}
    .quick{flex:1;border:1px solid rgba(10,76,62,.16);background:#fffdf8;color:var(--green);border-radius:999px;padding:9px 12px;font-family:inherit;font-weight:800;cursor:pointer}
    .micro{margin:0;color:var(--muted);font-size:14px}
    .preview{display:flex;flex-direction:column;gap:24px}
    .page{position:relative;min-height:1122px;background:white;border-radius:34px;padding:56px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(10,76,62,.08)}
    .page.standard:before{content:"";position:absolute;inset:0 auto 0 0;width:11px;background:linear-gradient(180deg,var(--yellow),var(--green))}
    .page.standard:after{content:"";position:absolute;width:260px;height:260px;border-radius:50%;background:rgba(231,189,82,.13);left:-90px;top:-90px;z-index:0}
    .page > *{position:relative;z-index:1}
    .pwp-watermark{position:absolute;inset:0;z-index:0;pointer-events:none}
    .pwp-watermark:before{content:"";position:absolute;inset:0;background-image:var(--pwp-logo);background-repeat:no-repeat;background-position:center 58%;background-size:430px auto;opacity:.035;filter:grayscale(1) brightness(.7)}
    .dark-watermark:before{opacity:.06;filter:brightness(0) invert(1)}
    .cover{background:linear-gradient(135deg,var(--green),#084739 70%);color:white;padding:0;display:flex;flex-direction:column;justify-content:space-between}
    .cover .top-band,.cover .bottom-band,.closing .top-band,.closing .bottom-band{height:38px;background:var(--yellow);position:relative;z-index:2}
    .cover-body,.closing-body{position:relative;flex:1;padding:34px 40px 36px;display:flex;flex-direction:column}
    .cover-body:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 35% 45%, rgba(255,255,255,.05), transparent 34%), repeating-radial-gradient(circle at 42% 50%, rgba(0,0,0,.10) 0 1px, transparent 1px 16px);opacity:.45;z-index:0}
    .brand-image{width:190px;height:56px;background-image:var(--pwp-logo);background-repeat:no-repeat;background-size:contain;background-position:center;filter:brightness(0) saturate(100%) invert(83%) sepia(34%) saturate(844%) hue-rotate(353deg) brightness(96%) contrast(89%)}
    .cover-top{display:flex;direction:ltr;justify-content:flex-start;align-items:flex-start;min-height:82px}
    .cover-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:1;padding:0 70px}
    .cover h1{font-size:46px;line-height:1.25;margin:0 0 12px;max-width:760px;font-weight:800;color:#fff}
    .cover .cover-copy{font-size:28px;color:rgba(255,255,255,.92);max-width:750px;line-height:1.5;margin:0}
    .cover-meta{display:none}
    .cover-box{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.2);border-radius:24px;padding:18px 22px;backdrop-filter:blur(6px)}
    .cover-date{position:absolute;left:40px;bottom:34px;color:#fff;font-size:22px;font-weight:800;z-index:2}
    .cover-box small{display:block;color:#f2ca66;font-size:16px;line-height:1.2;margin-bottom:6px}
    .cover-box strong{display:block;font-size:26px;line-height:1.3;color:#f8f3e6}
    .kicker{display:inline-flex;align-items:center;border-radius:999px;padding:8px 14px;background:rgba(231,189,82,.18);color:var(--green);font-size:14px;font-weight:800;margin-bottom:18px}
    .title{font-size:42px;line-height:1.2;margin:0 0 14px;color:var(--green);font-weight:800}
    .subtitle{font-size:21px;color:var(--muted);max-width:860px;margin:0 0 28px;line-height:1.9}
    .lead{margin-top:28px;background:var(--green);color:white;border-radius:28px;padding:28px;font-size:26px;line-height:1.7;font-weight:700}
    .grid-2,.grid-3,.option-grid,.summary-box,.signature,.stat-row{display:grid;gap:18px}
    .grid-2{grid-template-columns:1fr 1fr}
    .grid-3{grid-template-columns:repeat(3,1fr)}
    .stat-row{grid-template-columns:repeat(4,1fr);margin:34px 0}
    .stat{background:var(--soft);border:1px solid var(--line);border-radius:26px;padding:24px;text-align:center}
    .stat strong{display:block;color:var(--green);font-size:36px;line-height:1;font-weight:800}
    .stat span{display:block;color:var(--muted);font-weight:700;margin-top:8px}
    .info{background:#fffdf8;border:1px solid var(--line);border-radius:26px;padding:24px;min-height:158px}
    .info.soft{background:#f7f4eb}
    .info.yellow{background:rgba(231,189,82,.17)}
    .info h3{font-size:24px;color:var(--green);margin:0 0 8px}
    .info p{margin:0;color:var(--muted);font-size:17px;line-height:1.8}
    h3{color:var(--green);font-size:24px;margin:24px 0 10px}
    .service-list{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .pill{background:#fffdf8;border:1px solid var(--line);border-radius:18px;padding:14px 16px;font-weight:700;color:var(--ink)}
    .channel-list{display:flex;flex-wrap:wrap;gap:10px}
    .channel{display:inline-flex;align-items:center;padding:11px 18px;border-radius:999px;background:var(--green);color:white;font-weight:800}
    .divider{height:1px;background:var(--line);margin:28px 0}
    .logo-page-wrap{display:flex;flex-direction:column;gap:24px}
    .logo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;margin-top:10px}
    .logo-card{background:#fffdf8;border:1px solid var(--line);border-radius:24px;padding:20px;display:flex;align-items:center;justify-content:center;min-height:120px}
    .logo-card img{max-width:100%;max-height:56px;object-fit:contain;filter:grayscale(.05)}
    .logo-note{background:rgba(231,189,82,.16);border:1px solid rgba(231,189,82,.38);border-radius:24px;padding:18px 20px;color:var(--ink);font-size:18px}
    .option-grid{grid-template-columns:1fr 1fr}
    .option-card{border:1px solid var(--line);border-radius:34px;padding:30px;background:#fffdf8;min-height:520px;position:relative;overflow:hidden}
    .option-card.featured{background:linear-gradient(180deg,rgba(231,189,82,.18),#fffdf8);border-color:rgba(231,189,82,.55)}
    .option-card h3{font-size:34px;margin:0 0 10px;color:var(--green)}
    .option-card .desc{color:var(--muted);font-size:18px;line-height:1.8}
    .amount{background:var(--green);color:white;border-radius:26px;padding:18px;font-size:31px;font-weight:800;margin:22px 0}
    .amount small{display:block;font-size:14px;color:rgba(255,255,255,.7);font-weight:600}
    .spec-list{padding:0;margin:0;list-style:none;display:grid;gap:10px}
    .spec-list li{display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid var(--line);padding:11px 0;color:var(--muted);font-size:17px}
    .spec-list strong{font-size:22px;color:var(--green)}
    table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border:1px solid var(--line);border-radius:24px;background:white}
    th,td{padding:16px;border-bottom:1px solid var(--line);text-align:right;vertical-align:middle}
    th{background:var(--green);color:white;font-size:16px}
    td{font-size:17px;color:var(--ink)}
    tr:last-child td{border-bottom:0}
    .summary-box{grid-template-columns:1fr 1fr;margin-top:20px}
    .money{border-radius:24px;padding:20px;background:var(--green);color:white}
    .money.yellow{background:var(--yellow);color:var(--green)}
    .money h3{margin:0 0 8px;color:inherit;font-size:18px}
    .money strong{font-size:30px}
    .note,.payment-note{background:rgba(231,189,82,.16);border:1px solid rgba(231,189,82,.38);border-radius:24px;padding:20px;color:var(--ink);font-size:18px}
    .closing{background:linear-gradient(135deg,var(--green),#084739 70%);color:white;padding:0;display:flex;flex-direction:column;justify-content:space-between}
    .closing-body{justify-content:flex-start}
    .closing .brand-image{margin-top:0;align-self:flex-start;direction:ltr}
    .closing .section-label{display:none}
    .closing h2{font-size:58px;line-height:1.15;margin:0 0 14px;color:white;max-width:860px;text-align:center}
    .closing .closing-text{font-size:27px;color:rgba(255,255,255,.86);max-width:860px;line-height:1.6;margin:0 auto 34px;text-align:center}
    .closing-panel{display:none}
    .closing-panel h3{margin:0 0 8px;font-size:26px;color:var(--green)}
    .closing-panel p{margin:0;font-size:18px;line-height:1.9;color:#8c7b55}
    .closing-bottom{display:none}
    .closing-card{background:#f5f2ec;color:var(--green);border-radius:28px;padding:24px;min-height:154px}
    .closing-card h4{margin:0 0 10px;font-size:24px}
    .choice-row{display:flex;gap:22px;align-items:center;flex-wrap:wrap;color:#d9c59a;font-size:20px}
    .sig-line-light{margin-top:18px;border-bottom:2px solid #dfc586;min-height:34px;color:#d7c39b}
    .footer-brand,.page-num{position:absolute;bottom:26px;color:rgba(10,76,62,.45);font-weight:800;font-size:13px}
    .closing-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:0 80px;z-index:1}
    .closing-date{position:absolute;left:40px;bottom:34px;color:#fff;font-size:22px;font-weight:800;z-index:2}
    .closing-brand-bottom{position:absolute;right:40px;bottom:34px;color:#fff;font-size:22px;font-weight:800;z-index:2}
    .footer-brand{right:56px}
    .page-num{left:56px}
    .cover .footer-brand,.cover .page-num,.closing .footer-brand,.closing .page-num{color:rgba(255,255,255,.5)}
    @media print{
      body{background:white}
      .no-print,.app-header,.controls{display:none!important}
      .layout{display:block;padding:0;max-width:none}
      .preview{gap:0}
      .page{border:0;border-radius:0;box-shadow:none;min-height:100vh;page-break-after:always;padding:46px}
      .cover,.closing{padding:0}
      .cover-body,.closing-body{padding:44px 54px 50px}
      .page:last-child{page-break-after:auto}
      @page{size:A4;margin:0}
      .cover h1{font-size:54px}
      .title{font-size:34px}
      .subtitle{font-size:16px}
      .grid-3{grid-template-columns:repeat(3,1fr)}
      .option-grid,.grid-2,.summary-box,.signature,.closing-bottom,.logo-grid,.stat-row{grid-template-columns:1fr 1fr}
      .logo-grid{grid-template-columns:repeat(4,1fr)}
    }
    @media (max-width:980px){
      .layout{grid-template-columns:1fr}
      .wrap{flex-direction:column;align-items:flex-start}
      .page{padding:30px;min-height:auto}
      .cover,.closing{padding:0}
      .cover-body,.closing-body{padding:30px}
      .cover h1,.closing h2{font-size:42px}
      .grid-2,.grid-3,.service-list,.summary-box,.signature,.option-grid,.stat-row,.closing-bottom,.logo-grid,.cover-meta{grid-template-columns:1fr}
      .controls{order:1;position:relative;top:auto;max-height:none}
      .preview{order:2}
      .two,.three{grid-template-columns:1fr}
      .logo-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
  <header class="app-header no-print">
    <div class="wrap">
      <div class="brand-lockup">
        <div class="mark">PWP</div>
        <div>
          <h1>مولّد عروض Post With Passion</h1>
          <p>نسخة محدثة مع غلاف وختام أقرب لعرضك المرجعي وصفحة شعارات عملائنا.</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-dark" onclick="renderProposal()">تحديث العرض</button>
        <button class="btn btn-primary" onclick="window.print()">طباعة أو حفظ PDF</button>
        <button class="btn btn-soft" onclick="copySummary()">نسخ الملخص</button>
      </div>
    </div>
  </header>

  <main class="layout">
    <aside class="controls no-print">
      <details class="panel" open>
        <summary><span>01 بيانات العميل</span></summary>
        <div class="panel-body">
          <div class="field"><label>اسم العميل</label><input class="input" id="clientName" value="اسم العميل"></div>
          <div class="two">
            <div class="field"><label>التاريخ</label><input class="input" id="proposalDate" type="date"></div>
            <div class="field"><label>مدة المشروع</label><input class="input" id="duration" value="3 أشهر"></div>
          </div>
          <div class="field"><label>الهدف الرئيسي</label><textarea id="mainGoal">بناء حضور رقمي أقوى وزيادة فرص الوصول إلى العملاء المحتملين من خلال محتوى محلي وحملات إعلانية قابلة للقياس.</textarea></div>
        </div>
      </details>

      <details class="panel" open>
        <summary><span>02 الخدمات والقنوات</span></summary>
        <div class="panel-body">
          <p class="micro">اختر الخدمات والقنوات التي تريد ظهورها في نطاق العمل.</p>
          <div class="quick-row">
            <button class="quick" onclick="selectRecommended('lean')">اقتراح اقتصادي</button>
            <button class="quick" onclick="selectRecommended('growth')">اقتراح نمو</button>
          </div>
          <div class="field"><label>الخدمات</label><div id="services" class="check-grid"></div></div>
          <div class="field"><label>القنوات</label><div id="channels" class="check-grid"></div></div>
        </div>
      </details>

      <details class="panel" open>
        <summary><span>03 Option 1</span></summary>
        <div class="panel-body">
          <div class="field"><label>اسم الخيار</label><input class="input" id="option1Title" value="Option 1"></div>
          <div class="field"><label>وصف الخيار</label><textarea id="option1Desc">مناسب للعميل الذي يحتاج حضورًا منظمًا ومحتوى مستمرًا مع تشغيل إعلانات أساسي لاختبار الرسائل والقنوات الأعلى أداءً.</textarea></div>
          <div class="three">
            <div class="field"><label>التصاميم</label><input class="input" id="option1Designs" type="number" value="12"></div>
            <div class="field"><label>الفيديوهات القصيرة</label><input class="input" id="option1Videos" type="number" value="6"></div>
            <div class="field"><label>UGC</label><input class="input" id="option1Ugc" type="number" value="2"></div>
          </div>
          <div class="three">
            <div class="field"><label>AI Videos</label><input class="input" id="option1Ai" type="number" value="3"></div>
            <div class="field"><label>المنصات</label><input class="input" id="option1Platforms" type="number" value="3"></div>
            <div class="field"><label>رسوم الباقة</label><input class="input" id="option1Fee" type="number" value="12000"></div>
          </div>
          <div class="two">
            <div class="field"><label>ميزانية الإعلانات</label><input class="input" id="option1Ad" type="number" value="5000"></div>
            <div class="field"><label>رسوم إدارة الإعلانات</label><input class="input" id="option1Mgmt" type="number" value="1500"></div>
          </div>
        </div>
      </details>

      <details class="panel" open>
        <summary><span>04 Option 2</span></summary>
        <div class="panel-body">
          <div class="field"><label>اسم الخيار</label><input class="input" id="option2Title" value="Option 2"></div>
          <div class="field"><label>وصف الخيار</label><textarea id="option2Desc">مناسب للعميل الذي يريد تشغيلًا أقوى ومحتوى أكثر تنوعًا لاختبار زوايا متعددة، مع مساحة أكبر للإعلانات والتحسين المستمر.</textarea></div>
          <div class="three">
            <div class="field"><label>التصاميم</label><input class="input" id="option2Designs" type="number" value="16"></div>
            <div class="field"><label>الفيديوهات القصيرة</label><input class="input" id="option2Videos" type="number" value="10"></div>
            <div class="field"><label>UGC</label><input class="input" id="option2Ugc" type="number" value="4"></div>
          </div>
          <div class="three">
            <div class="field"><label>AI Videos</label><input class="input" id="option2Ai" type="number" value="5"></div>
            <div class="field"><label>المنصات</label><input class="input" id="option2Platforms" type="number" value="4"></div>
            <div class="field"><label>رسوم الباقة</label><input class="input" id="option2Fee" type="number" value="18000"></div>
          </div>
          <div class="two">
            <div class="field"><label>ميزانية الإعلانات</label><input class="input" id="option2Ad" type="number" value="10000"></div>
            <div class="field"><label>رسوم إدارة الإعلانات</label><input class="input" id="option2Mgmt" type="number" value="2500"></div>
          </div>
        </div>
      </details>

      <details class="panel" open>
        <summary><span>05 الشروط والضريبة</span></summary>
        <div class="panel-body">
          <label class="check"><input id="vatEnabled" type="checkbox" checked> احتساب ضريبة القيمة المضافة 15%</label>
          <div class="field"><label>ملاحظة الإعلانات</label><textarea id="notes">يتم تعديل توزيع الميزانية بناءً على أداء الحملات، مع رفع الصرف على القنوات الأعلى أداءً وتقليل الصرف على القنوات الأقل فعالية.</textarea></div>
          <div class="field"><label>ملاحظة الدفع المقدّم</label><textarea id="paymentNote">يتم اعتماد المشروع وبدء العمل بعد سداد الدفعة المقدمة، وتكون المدفوعات الشهرية مقدمة قبل بداية كل شهر عمل.</textarea></div>
          <button class="btn btn-primary btn-block" onclick="renderProposal()">تحديث العرض الآن</button>
        </div>
      </details>
    </aside>

    <section class="preview" id="preview"></section>
  </main>

    const growthServices = ['خدمة 360 تشغيل تسويقي متكامل','استراتيجية محتوى شهرية','إدارة حسابات التواصل الاجتماعي','تصاميم سوشيال ميديا','فيديوهات قصيرة Reels / TikTok / Shorts','فيديوهات UGC','فيديوهات مولدة بالذكاء الاصطناعي AI','كتابة المحتوى والكابشنز','إدارة الحملات الإعلانية','تقارير أداء وتوصيات شهرية','صفحة هبوط Landing Page'];

  function distribution(channels, budget) {
    const filtered = channels.filter(c => c !== 'WhatsApp' && c !== 'YouTube Shorts');
    const weights = filtered.map(c => c.includes('Google') ? 30 : c.includes('Instagram') ? 35 : c.includes('TikTok') ? 25 : c.includes('LinkedIn') ? 20 : 10);
    const sum = weights.reduce((a,b) => a + b, 0) || 1;
    return filtered.map((c,i) => ({channel:c, pct:Math.round(weights[i] / sum * 100), amount:Math.round(budget * weights[i] / sum)}));
  }

  function addPage(html, num, cls='standard') {
    const watermarkClass = cls.includes('cover') ? '' : (cls.includes('closing') ? 'dark-watermark' : '');

  }
